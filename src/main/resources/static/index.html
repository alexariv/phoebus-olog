<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Olog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }
    body { 
      margin: 0; 
      padding: 0; 
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    /* Header */
    .header {
      background-color: #2c3e50;
      color: white;
      padding: 15px 20px;
      border-bottom: 1px solid #34495e;
    }
    .header h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 500;
    }

    /* Main container - three columns */
    .container {
      display: flex;
      height: calc(100vh - 61px);
    }

    /* Left navigation - Filters */
    .sidebar-left {
      width: 20%;
      min-width: 250px;
      background-color: #f5f5f5;
      border-right: 1px solid #ddd;
      overflow-y: auto;
      padding: 15px;
    }

    .filter-section {
      margin-bottom: 20px;
    }

    .filter-header {
      font-weight: 600;
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 8px;
      cursor: pointer;
      user-select: none;
      padding: 8px;
      background-color: #e3e3e3;
      border-radius: 3px;
    }

    .filter-header:hover {
      background-color: #d5d5d5;
    }

    .filter-content {
      margin-top: 8px;
      max-height: 250px;
      overflow-y: auto;
      background: white;
    }

    .filter-content.collapsed {
      display: none;
    }

    .filter-item {
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.9rem;
      color: #0088cc;
      border: none;
    }

    .filter-item:nth-child(odd) {
      background-color: #f5f5f5;
    }

    .filter-item:nth-child(even) {
      background-color: #fafafa;
    }

    .filter-item:hover {
      background-color: #e8e8e8;
    }

    .filter-item.selected {
      background-color: #82bcd9;
      color: white;
    }

    .date-inputs {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
    }

    .date-inputs label {
      font-size: 0.85rem;
      color: #555;
    }

    .date-inputs input {
      padding: 6px;
      border: 1px solid #ccc;
      border-radius: 3px;
      font-size: 0.9rem;
    }

    /* Middle navigation - List of logs */
    .content-middle {
      width: 30%;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #ddd;
    }

    .search-box {
      padding: 15px;
      background-color: white;
      border-bottom: 1px solid #ddd;
    }

    .search-input-wrapper {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    #searchInput {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
    }

    .search-buttons {
      display: flex;
      gap: 8px;
    }

    .btn {
      padding: 8px 16px;
      border: 1px solid #bbb;
      border-radius: 4px;
      background: #f5f5f5;
      cursor: pointer;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .btn:hover {
      background: #e8e8e8;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .results-list {
      flex: 1;
      overflow-y: auto;
      background-color: #fafafa;
    }

    .result-item {
      padding: 12px 15px;
      border-bottom: 1px solid #e0e0e0;
      cursor: pointer;
      background-color: white;
      margin-bottom: 1px;
    }

    .result-item:hover {
      background-color: #f9f9f9;
    }

    .result-item.selected {
      background-color: #82bcd9;
      color: white;
    }

    .result-item.selected .result-meta {
      color: #f0f0f0;
    }

    .result-title {
      font-weight: 500;
      margin-bottom: 4px;
      font-size: 0.95rem;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .result-meta {
      font-size: 0.8rem;
      color: #666;
    }

    /* Right navigation - Log view */
    .sidebar-right {
      flex: 1;
      background-color: white;
      overflow-y: auto;
      padding: 20px;
    }

    .analysis-section {
      background-color: #f9f9f9;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 15px;
      margin-bottom: 20px;
    }

    .analysis-section h3 {
      margin-top: 0;
      font-size: 1.1rem;
      color: #333;
    }

    .detail-view {
      margin-top: 10px;
    }

    .detail-view h3 {
      font-size: 1.2rem;
      margin-bottom: 15px;
      color: #2c3e50;
    }

    .detail-content {
      line-height: 1.6;
      color: #333;
    }

    .metadata-grid {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 8px;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #e0e0e0;
    }

    .metadata-label {
      font-weight: 600;
      color: #666;
      font-size: 0.9rem;
    }

    .metadata-value {
      color: #333;
      font-size: 0.9rem;
    }

    .placeholder {
      color: #999;
      font-style: italic;
      text-align: center;
      padding: 40px 20px;
    }

    .loading {
      color: #666;
      font-style: italic;
    }

    .error {
      color: #d32f2f;
      background-color: #ffebee;
      padding: 10px;
      border-radius: 4px;
      margin: 10px 0;
    }

    .entry-link {
      color: #007bff;
      text-decoration: none;
      font-weight: 500;
    }
    
    .entry-link:hover {
      text-decoration: underline;
    }
    
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1>Olog</h1>
  </div>

  <!-- Main Container -->
  <div class="container">
    <!-- Left navigation - Filters -->
    <div class="sidebar-left">
      <div style="padding: 10px 8px; font-weight: 500; font-size: 1rem; color: #333; border-bottom: 1px solid #ddd; margin-bottom: 15px;">
        <b> Filter Log Entries </b>
      </div>

      <div class="filter-section">
        <div class="filter-header" onclick="toggleFilter('logbooks')">
          ► LOGBOOKS
        </div>
        <div id="logbooks" class="filter-content collapsed">
          <!-- JavaScript list for now -->
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-header" onclick="toggleFilter('tags')">
          ► TAGS
        </div>
        <div id="tags" class="filter-content collapsed">
          <!-- JavaScript list for now -->
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-header" onclick="toggleFilter('dateRange')">
          ► CREATED FROM - TO
        </div>
        <div id="dateRange" class="filter-content collapsed">
          <div class="date-inputs">
            <label>
              From:
              <input type="date" id="dateFrom">
            </label>
            <label>
              To:
              <input type="date" id="dateTo">
            </label>
            <button class="btn" onclick="clearDates()">Clear Dates</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Middle navigation - List of Logs -->
    <div class="content-middle">
      <div class="search-box">
        <div class="search-input-wrapper">
          <input type="text" id="searchInput" placeholder="Search ...">
        </div>
        <div class="search-buttons">
          <button class="btn" id="simpleBtn" onclick="doSimpleSearch()">Search</button>
          <button class="btn" id="advancedBtn" onclick="doAdvancedSearch()">Advanced Search</button>
        </div>
      </div>

      <div class="results-list" id="resultsList">
        <div class="placeholder">Enter a search query to see results</div>
      </div>
    </div>

    <!-- Right navigation -->
    <div class="sidebar-right" id="detailPanel">
      
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
